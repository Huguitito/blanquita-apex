<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Odontología - Recepción</title>
    <script src="https://unpkg.com/retell-client-js-sdk/dist/retell-client-js-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { text-align: center; background: white; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 450px; }
        #start-btn { background-color: #00a896; color: white; border: none; padding: 22px 45px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; }
        #start-btn:disabled { background-color: #ccc; }
        .status-msg { margin-top: 25px; font-weight: bold; color: #00a896; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size: 50px;">🦷</div>
        <h1>Bienvenido a APEX</h1>
        <p>Tocá el botón para anunciar tu llegada.</p>
        <button id="start-btn">ANUNCIAR MI LLEGADA</button>
        <div id="status-msg" class="status-msg"></div>
    </div>

    <script>
        // ESTA ES LA LÍNEA QUE CORRIGE EL ERROR DE LA CAPTURA:
        const retellWebClient = new Retell.RetellWebClient();
        
        const btn = document.getElementById('start-btn');
        const status = document.getElementById('status-msg');

        btn.addEventListener('click', async () => {
            try {
                btn.disabled = true;
                status.innerText = "Conectando...";

                const response = await fetch('/api/create-web-call', { method: 'POST' });
                const data = await response.json();

                if (!data.access_token) throw new Error("No token");

                await retellWebClient.startCall({
                    accessToken: data.access_token,
                });

                status.innerText = "Blanquita te escucha...";
                btn.innerText = "HABLANDO...";

            } catch (err) {
                console.error(err);
                status.innerText = "Error de conexión.";
                btn.disabled = false;
                btn.innerText = "ANUNCIAR MI LLEGADA";
            }
        });

        retellWebClient.on("call_ended", () => {
            status.innerText = "¡Listo! Ya avisamos.";
            btn.disabled = false;
            btn.innerText = "ANUNCIAR MI LLEGADA";
        });
    </script>
</body>
</html>
