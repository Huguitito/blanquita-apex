<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Odontología</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <img src="logo%20apex.jpeg" alt="APEX" class="logo">

    <div class="subtitle">
        Recepción Virtual Inteligente
    </div>

    <div class="welcome">
        Bienvenido a APEX Odontología.<br>
        Puede hablar con nuestra recepcionista virtual o seguir la conversación en pantalla.
    </div>

    <div class="orb-container">
        <div id="orb" class="orb"></div>
    </div>

    <div id="status" class="status">
        Presione el botón para comenzar
    </div>

    <button id="callButton">
        Iniciar consulta
    </button>

    <div id="transcript" class="transcript">
        <div class="placeholder">
            La conversación aparecerá aquí.
        </div>
    </div>

</div>

<script type="module">
    import * as RetellSDK from 'https://cdn.jsdelivr.net/npm/retell-client-js-sdk/+esm';

    window.RetellSDK = RetellSDK;

    const script = document.createElement('script');
    script.src = 'app.js';
    document.body.appendChild(script);
</script>

</body>
</html>
